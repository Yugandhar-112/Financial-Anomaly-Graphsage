<svg width="680" height="280" viewBox="0 0 680 280" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Architecture: browser to frontend to API to models</title>
<desc>A request flows from the browser, to the Next.js frontend on Vercel, to the FastAPI backend on Render, to the trained model checkpoints.</desc>
<style>
  text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; }
  .th { font-size: 14px; font-weight: 500; }
  .ts { font-size: 12px; font-weight: 400; }
</style>
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#5F5E5A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<rect width="680" height="280" fill="#ffffff"/>

<g>
  <rect x="40" y="150" width="138" height="56" rx="8" fill="#F1EFE8" stroke="#888780" stroke-width="0.5"/>
  <text class="th" fill="#2C2C2A" x="109" y="172" text-anchor="middle" dominant-baseline="central">Browser</text>
  <text class="ts" fill="#5F5E5A" x="109" y="194" text-anchor="middle" dominant-baseline="central">Loads demo UI</text>
</g>

<g>
  <rect x="192" y="150" width="138" height="56" rx="8" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.5"/>
  <text class="th" fill="#085041" x="261" y="172" text-anchor="middle" dominant-baseline="central">Frontend</text>
  <text class="ts" fill="#0F6E56" x="261" y="194" text-anchor="middle" dominant-baseline="central">Next.js · Vercel</text>
</g>

<g>
  <rect x="344" y="150" width="138" height="56" rx="8" fill="#E6F1FB" stroke="#378ADD" stroke-width="0.5"/>
  <text class="th" fill="#0C447C" x="413" y="172" text-anchor="middle" dominant-baseline="central">API</text>
  <text class="ts" fill="#185FA5" x="413" y="194" text-anchor="middle" dominant-baseline="central">FastAPI · Render</text>
</g>

<g>
  <rect x="496" y="150" width="138" height="56" rx="8" fill="#FAECE7" stroke="#D85A30" stroke-width="0.5"/>
  <text class="th" fill="#712B13" x="565" y="172" text-anchor="middle" dominant-baseline="central">Models</text>
  <text class="ts" fill="#993C1D" x="565" y="194" text-anchor="middle" dominant-baseline="central">4 trained models</text>
</g>

<line x1="178" y1="178" x2="190" y2="178" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="330" y1="178" x2="342" y2="178" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="482" y1="178" x2="494" y2="178" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>

<text class="ts" fill="#5F5E5A" x="340" y="250" text-anchor="middle">Gray = client · Teal = client app · Blue = server · Coral = trained artifacts</text>
</svg>
